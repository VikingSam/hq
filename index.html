<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="favicon.png">
<title>The Portal to Global Domination</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cinzel+Decorative:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0804;
    color: #e8d5a3;
    font-family: 'Cinzel', serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ─── HERO — full viewport, no scroll ─── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 36px;
    overflow: hidden;
  }

  .hero-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    z-index: 0;
  }

  /* Gradient: clear top-left, dark at bottom */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,8,4,0) 0%,
      rgba(10,8,4,0) 30%,
      rgba(10,8,4,0.55) 58%,
      rgba(10,8,4,0.92) 78%,
      rgba(10,8,4,1) 100%
    );
    z-index: 1;
  }

  /* ─── SHIELD GRID — overlaid in the middle zone ─── */
  .shield-overlay {
    position: absolute;
    z-index: 2;
    /* sit in the empty space: below Sam's torso, above title */
    bottom: 160px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
  }

  .shield-grid {
    display: grid;
    grid-template-columns: repeat(6, 120px);
    gap: 10px 18px;
    justify-content: center;
  }

  .shield-link {
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: transform 0.22s ease, filter 0.22s ease;
  }

  .shield-link:hover {
    transform: translateY(-8px);
    filter: drop-shadow(0 0 16px var(--glow));
  }

  .shield-wrap {
    position: relative;
    width: 100px;
    height: 100px;
  }

  .shield-svg { width: 100%; height: 100%; }

  .shield-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    line-height: 1;
  }

  .shield-name {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #e8d5a3;
    text-align: center;
    max-width: 110px;
    line-height: 1.4;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }

  /* ─── TITLE at bottom ─── */
  .hero-text {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .hero-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.2rem, 3.2vw, 2.8rem);
    font-weight: 700;
    letter-spacing: 0.18em;
    word-spacing: 0.3em;
    text-transform: uppercase;
    color: #fff;
    text-shadow:
      0 0 40px rgba(255,140,0,0.9),
      0 0 80px rgba(255,60,0,0.5),
      2px 2px 0 rgba(0,0,0,0.9);
    line-height: 1.2;
  }

  .hero-rune {
    font-size: clamp(0.55rem, 1vw, 0.75rem);
    letter-spacing: 0.5em;
    color: #c8973a;
    text-transform: uppercase;
    margin-top: 10px;
    text-shadow: 0 0 16px rgba(200,150,58,0.7);
  }

  /* ─── EMBERS ─── */
  .ember { position: fixed; pointer-events: none; z-index: 999; border-radius: 50%; }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.9; }
    100% { transform: translateY(-100vh) translateX(var(--drift)) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<section class="hero">
  <img src="hero.png" alt="The Viking" class="hero-img">

  <!-- SHIELDS overlaid on hero -->
  <div class="shield-overlay">
    <div class="shield-grid">

      <!-- FR44 Daily Report -->
      <a href="https://vikingsam.github.io/fr44-reports/" class="shield-link" style="--glow: rgba(255,120,0,0.8);">
        <div class="shield-wrap">
          <svg class="shield-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="g1" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#8b3a00"/><stop offset="100%" stop-color="#2a0e00"/>
            </radialGradient></defs>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="url(#g1)" stroke="#c06020" stroke-width="2"/>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="none" stroke="#7a3010" stroke-width="5" opacity="0.4"/>
            <circle cx="50" cy="52" r="16" fill="none" stroke="#c06020" stroke-width="1.5"/>
          </svg>
          <div class="shield-icon">📊</div>
        </div>
        <span class="shield-name">FR44<br>Report</span>
      </a>

      <!-- Token Dashboard -->
      <a href="https://vikingsam.github.io/token-dashboard/" class="shield-link" style="--glow: rgba(140,80,255,0.8);">
        <div class="shield-wrap">
          <svg class="shield-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="g2" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#3a1a6b"/><stop offset="100%" stop-color="#0e0520"/>
            </radialGradient></defs>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="url(#g2)" stroke="#7040c0" stroke-width="2"/>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="none" stroke="#4020a0" stroke-width="5" opacity="0.4"/>
            <circle cx="50" cy="52" r="16" fill="none" stroke="#7040c0" stroke-width="1.5"/>
          </svg>
          <div class="shield-icon">⚡</div>
        </div>
        <span class="shield-name">Token<br>Dashboard</span>
      </a>

      <!-- Bot Army -->
      <a href="https://vikingsam.github.io/bot-ops/" class="shield-link" style="--glow: rgba(0,200,120,0.8);">
        <div class="shield-wrap">
          <svg class="shield-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="g3" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#0a3a20"/><stop offset="100%" stop-color="#020e08"/>
            </radialGradient></defs>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="url(#g3)" stroke="#20a060" stroke-width="2"/>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="none" stroke="#106030" stroke-width="5" opacity="0.4"/>
            <circle cx="50" cy="52" r="16" fill="none" stroke="#20a060" stroke-width="1.5"/>
          </svg>
          <div class="shield-icon">🤖</div>
        </div>
        <span class="shield-name">Bot Army<br>Ops</span>
      </a>

      <!-- AdWords -->
      <a href="https://lemon-fossil-6dc6.here.now/" class="shield-link" style="--glow: rgba(255,200,0,0.8);">
        <div class="shield-wrap">
          <svg class="shield-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="g4" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#5a4a00"/><stop offset="100%" stop-color="#1a1200"/>
            </radialGradient></defs>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="url(#g4)" stroke="#c8a020" stroke-width="2"/>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="none" stroke="#907010" stroke-width="5" opacity="0.4"/>
            <circle cx="50" cy="52" r="16" fill="none" stroke="#c8a020" stroke-width="1.5"/>
          </svg>
          <div class="shield-icon">⚔️</div>
        </div>
        <span class="shield-name">AdWords<br>War Room</span>
      </a>

      <!-- Ops Calendar -->
      <a href="https://placid-timber-yknq.here.now/" class="shield-link" style="--glow: rgba(0,160,220,0.8);">
        <div class="shield-wrap">
          <svg class="shield-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="g5" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#003a5a"/><stop offset="100%" stop-color="#000e1a"/>
            </radialGradient></defs>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="url(#g5)" stroke="#0090c0" stroke-width="2"/>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="none" stroke="#005080" stroke-width="5" opacity="0.4"/>
            <circle cx="50" cy="52" r="16" fill="none" stroke="#0090c0" stroke-width="1.5"/>
          </svg>
          <div class="shield-icon">🗓️</div>
        </div>
        <span class="shield-name">Ops<br>Calendar</span>
      </a>

      <!-- Video Hopper -->
      <a href="https://airtable.com/apphRVhGXOrjVMRNn/tbl3Yy2ytpdUMpOv5" class="shield-link" style="--glow: rgba(255,60,80,0.8);">
        <div class="shield-wrap">
          <svg class="shield-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="g6" cx="40%" cy="35%" r="65%">
              <stop offset="0%" stop-color="#5a0a15"/><stop offset="100%" stop-color="#1a0005"/>
            </radialGradient></defs>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="url(#g6)" stroke="#c02040" stroke-width="2"/>
            <path d="M50 5 L92 22 L92 58 Q92 86 50 97 Q8 86 8 58 L8 22 Z" fill="none" stroke="#801030" stroke-width="5" opacity="0.4"/>
            <circle cx="50" cy="52" r="16" fill="none" stroke="#c02040" stroke-width="1.5"/>
          </svg>
          <div class="shield-icon">🎬</div>
        </div>
        <span class="shield-name">Video<br>Hopper</span>
      </a>

    </div>
  </div>

  <!-- TITLE at bottom -->
  <div class="hero-text">
    <h1 class="hero-title">The Portal to Global Domination</h1>
    <p class="hero-rune">ᚠᚢᚦᚨᚱᚲ &nbsp;·&nbsp; Command &nbsp;·&nbsp; Conquer &nbsp;·&nbsp; Control &nbsp;·&nbsp; ᚠᚢᚦᚨᚱᚲ</p>
  </div>
</section>

<script>
  function spawnEmber() {
    const el = document.createElement('div');
    el.className = 'ember';
    const size = Math.random() * 4 + 1;
    const drift = (Math.random() - 0.5) * 100 + 'px';
    const dur = Math.random() * 4 + 3;
    Object.assign(el.style, {
      left: Math.random() * 100 + 'vw',
      bottom: '-10px',
      width: size + 'px',
      height: size + 'px',
      background: `hsl(${Math.random()*30+10},100%,${Math.random()*30+50}%)`,
      '--drift': drift,
      animation: `rise ${dur}s ease-out forwards`
    });
    document.body.appendChild(el);
    setTimeout(() => el.remove(), dur * 1000);
  }
  setInterval(spawnEmber, 350);
</script>
</body>
</html>
